name: CI/CD Pipeline

env:
  NODE_VERSION: '20'
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize]

jobs:
  lint-type-dependency-check:
    name: Lint, TypeScript Type, & Dependency Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency security audit
        run: npm audit --omit=dev --audit-level critical 

      - name: Check formatting/lint
        run: npx biome ci

      - name: Type check
        run: npx tsc --noEmit

  run-npm-tests:
    name: Run npm tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  test-deployment:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/hadron/carthage:latest
      options: --privileged
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      USER: root

    steps:
      - uses: actions/checkout@v6
      - name: Install prerequisites
        run: apt update && apt install -y qemu-system-arm qemu-efi-aarch64 python3-pytest python3-fastapi iproute2 iptables procps
      - name: Run libvirt/qemu as root # Avoids libvirt-qemu pytest directory permission issues
        run: |
          sed -i 's/#user = "root"/user = "root"/' /etc/libvirt/qemu.conf 
          sed -i 's/#group = "root"/group = "root"/' /etc/libvirt/qemu.conf
      - name: Start libvirtd
        run: |
          /usr/sbin/virtlogd -d
          /usr/sbin/libvirtd -d
      - name: Create WHS lab bridge
        run: |
          ip link show whs-lab >/dev/null 2>&1 || ip link add whs-lab type bridge
          ip link set whs-lab up
          if ! podman network inspect net >/dev/null 2>&1; then
            ip addr del 10.20.100.1/24 dev whs-lab >/dev/null 2>&1 || true
            podman network create net \
              -d bridge \
              -o com.docker.network.bridge.name=whs-lab \
              --label carthage.layout=viper-whs \
              --subnet 10.20.100.0/24 \
              --gateway 10.20.100.1 \
              -o mode=unmanaged
          fi
          ip addr replace 10.20.100.1/24 dev whs-lab
          sysctl -w net.ipv4.ip_forward=1
          iptables -C FORWARD -i whs-lab -j ACCEPT || iptables -A FORWARD -i whs-lab -j ACCEPT
          iptables -C FORWARD -o whs-lab -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT || iptables -A FORWARD -o whs-lab -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT
          iptables -t nat -C POSTROUTING -s 10.20.100.0/24 ! -o whs-lab -j MASQUERADE || iptables -t nat -A POSTROUTING -s 10.20.100.0/24 ! -o whs-lab -j MASQUERADE
      - name: Obtain Debian VM image
        run: |
          install -d -m 0775 -o root -g root /srv/carthage/libvirt
          install -d -m 0775 -o root -g root /srv/carthage/libvirt/viper-whs-ci
          install -d -m 0775 -o root -g root /srv/carthage/libvirt/viper-whs-ci/cache
          wget https://cloud.debian.org/images/cloud/trixie/latest/debian-13-nocloud-arm64.qcow2 -P /srv/carthage/libvirt
      - name: Run deployment tests
        env:
          WHS_TEST_VM_IMAGE_DIR: /srv/carthage/libvirt/viper-whs-ci
        run: mkdir -p /srv/whs && cd layout && pytest --basetemp=/srv/whs
