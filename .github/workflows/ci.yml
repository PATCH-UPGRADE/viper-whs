name: CI/CD Pipeline

env:
  NODE_VERSION: '20'
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, edited, reopened, synchronize]

jobs:
  lint-type-dependency-check:
    name: Lint, TypeScript Type, & Dependency Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency security audit
        run: npm audit --omit=dev --audit-level critical 

      - name: Check formatting/lint
        run: npx biome ci

      - name: Type check
        run: npx tsc --noEmit

  run-npm-tests:
    name: Run npm tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

